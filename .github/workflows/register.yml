name: FoxURL Registration

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Username"
        required: true
      contact_email:
        description: "Contact Email"
        required: true
      foxmail_email:
        description: "FoxMail Email"
        required: true
      password_hash:
        description: "SHA-256 Password Hash"
        required: true

jobs:
  add_user:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate safe random token
        id: token
        run: |
          TOKEN=$(openssl rand -hex 32)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Append new user to users.json
        run: |
          jq ". += [{
            \"name\": \"${{ github.event.inputs.username }}\",
            \"contact_email\": \"${{ github.event.inputs.contact_email }}\",
            \"foxmail_email\": \"${{ github.event.inputs.foxmail_email }}\",
            \"login_username\": \"${{ github.event.inputs.username }}\",
            \"password_hash\": \"${{ github.event.inputs.password_hash }}\",
            \"foxdrive_https\": \"https://foxdrive.example.com/${{ github.event.inputs.username }}/\",
            \"fox_token\": \"${{ steps.token.outputs.token }}\"
          }]" users.json > users.tmp

          mv users.tmp users.json

      - name: Commit and push changes
        run: |
          git config user.name "FoxURL Bot"
          git config user.email "bot@foxurl.com"
          git add users.json
          git commit -m "Add new user ${{ github.event.inputs.username }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.FOXURL_PAT }}
